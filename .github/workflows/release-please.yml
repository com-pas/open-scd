on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 #v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Update package-lock.json in release PR
      - name: Get PR branch
        if: ${{ steps.release.outputs.prs }}
        id: pr-branch
        run: |
          echo "name=$(echo '${{ steps.release.outputs.prs }}' | jq -r '.[0].headBranchName')" >> $GITHUB_OUTPUT
      
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ steps.pr-branch.outputs.name }}
          token: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.release.outputs.prs }}
      
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: "20"
        if: ${{ steps.release.outputs.prs }}
      
      - name: Update package-lock.json
        if: ${{ steps.release.outputs.prs }}
        run: npm install --package-lock-only
      
      - name: Check for changes
        if: ${{ steps.release.outputs.prs }}
        id: git-check
        run: |
          git diff --exit-code package-lock.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: ${{ steps.release.outputs.prs && steps.git-check.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: update package-lock.json"
          git push
      
      # The logic below handles the npm publication:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          submodules: "true"
        if: ${{ steps.release.outputs.releases_created }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
        if: ${{ steps.release.outputs.releases_created }}
      - run: npm ci --include=optional
        if: ${{ steps.release.outputs.releases_created }}
      - run: npm run build
        if: ${{ steps.release.outputs.releases_created }}

      - name: Publish core to npm
        run: cd packages/core && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/core--release_created'] }}
        continue-on-error: true

      - name: Publish forms to npm
        run: cd packages/forms && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/forms--release_created'] }}
        continue-on-error: true

      - name: Publish xml to npm
        run: cd packages/xml && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/xml--release_created'] }}
        continue-on-error: true

      - name: Publish plugins to npm
        run: cd packages/plugins && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/plugins--release_created'] }}
        continue-on-error: true

      - name: Publish open-scd to npm
        run: cd packages/openscd && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/openscd--release_created'] }}
        continue-on-error: true


      - name: Create and Zip Build Assets
        if: ${{ steps.release.outputs.releases_created && hashFiles('packages/distribution/dist/**') != '' }}
        run: | 
          zip -r open-scd.zip ./packages/distribution/dist/
          tar -czvf open-scd.tar.gz ./packages/distribution/dist/

      - name: Upload Build Assets to openscd release
        if: ${{ steps.release.outputs['packages/openscd--release_created'] && hashFiles('open-scd.zip') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs['packages/openscd--tag_name'] }} open-scd.zip open-scd.tar.gz
        continue-on-error: true
