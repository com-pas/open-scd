on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

name: release-please
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 #v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Update pnpm-lock.yaml in release PR
      - name: Get PR branch
        if: ${{ steps.release.outputs.prs_created }}
        id: pr-branch
        run: |
          echo "name=$(echo '${{ steps.release.outputs.prs }}' | jq -r '.[0].headBranchName')" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          ref: ${{ steps.pr-branch.outputs.name }}
          token: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.release.outputs.prs_created }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.5.0
          cache: true
        if: ${{ steps.release.outputs.prs_created || steps.release.outputs.releases_created }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version: "24.x"
        if: ${{ steps.release.outputs.prs_created || steps.release.outputs.releases_created }}

      - name: Update pnpm-lock.yaml
        if: ${{ steps.release.outputs.prs_created }}
        run: pnpm install --lockfile-only

      - name: Check for changes
        if: ${{ steps.release.outputs.prs_created }}
        id: git-check
        run: |
          git diff --exit-code pnpm-lock.yaml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: ${{ steps.release.outputs.prs_created && steps.git-check.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: update pnpm-lock.yaml"
          git push

      # The logic below handles the npm publication:
      - name: Checkout main branch incl submodules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          submodules: "true"
        if: ${{ steps.release.outputs.releases_created }}

      - name: Install dependencies and create build
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          pnpm ci --include=optional
          pnpm run build

      - name: Publish core to npm
        run: cd packages/core && pnpm publish --access public
        if: ${{ steps.release.outputs['packages/core--release_created'] }}
        continue-on-error: true

      - name: Publish forms to npm
        run: cd packages/forms && pnpm publish --access public
        if: ${{ steps.release.outputs['packages/forms--release_created'] }}
        continue-on-error: true

      - name: Publish xml to npm
        run: cd packages/xml && pnpm publish --access public
        if: ${{ steps.release.outputs['packages/xml--release_created'] }}
        continue-on-error: true

      - name: Publish plugins to npm
        run: cd packages/plugins && pnpm publish --access public
        if: ${{ steps.release.outputs['packages/plugins--release_created'] }}
        continue-on-error: true

      - name: Publish open-scd to npm
        run: cd packages/openscd && pnpm publish --access public
        if: ${{ steps.release.outputs['packages/openscd--release_created'] }}
        continue-on-error: true
