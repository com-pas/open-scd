on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 #v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          submodules: "true"
        if: ${{ steps.release.outputs.releases_created }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          cache: true

      - name: Setup Node.js 
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
        if: ${{ steps.release.outputs.releases_created }}
        
      - run: pnpm ci --include=optional
        if: ${{ steps.release.outputs.releases_created }}
      - run: pnpm run build
        if: ${{ steps.release.outputs.releases_created }}

      - name: Publish core to npm
        run: cd packages/core && pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/core--release_created'] }}
        continue-on-error: true

      - name: Publish forms to npm
        run: cd packages/forms && pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/forms--release_created'] }}
        continue-on-error: true

      - name: Publish xml to npm
        run: cd packages/xml && pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/xml--release_created'] }}
        continue-on-error: true

      - name: Publish plugins to npm
        run: cd packages/plugins && pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/plugins--release_created'] }}
        continue-on-error: true

      - name: Publish open-scd to npm
        run: cd packages/openscd && pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs['packages/openscd--release_created'] }}
        continue-on-error: true


      - name: Create and Zip Build Assets
        if: ${{ steps.release.outputs.releases_created && hashFiles('packages/distribution/dist/**') != '' }}
        run: | 
          zip -r open-scd.zip ./packages/distribution/dist/
          tar -czvf open-scd.tar.gz ./packages/distribution/dist/

      - name: Upload Build Assets to openscd release
        if: ${{ steps.release.outputs['packages/openscd--release_created'] && hashFiles('open-scd.zip') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs['packages/openscd--tag_name'] }} open-scd.zip open-scd.tar.gz
        continue-on-error: true
